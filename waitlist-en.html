<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tickets Soon | IAMS 4th World Congress 2026</title>

  <style>
    :root {
      --navy: #191052;
      --deep: #09051f;
      --purple: #3320a8;
      --violet: #5638f0;
      --pink: #f04d8b;
      --gold: #c9a24a;
      --gold-soft: #d8b25d;
      --white: #ffffff;
      --cream: #fbf7ef;
      --light: #f7f7fb;
      --dark-text: #111827;
      --gray-text: #4b5563;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--deep);
      color: var(--white);
      line-height: 1.55;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    /* HEADER */

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      color: var(--white);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .navbar {
      min-height: 78px;
      padding: 0 clamp(28px, 5vw, 96px);
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.25;
      color: rgba(255,255,255,0.86);
      max-width: 280px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(14px, 1.6vw, 26px);
      font-size: 18px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      white-space: nowrap;
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    .buy-btn {
      background: linear-gradient(135deg, var(--pink), #ff6b4a);
      color: white;
      padding: 13px 21px;
      border-radius: 999px;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(240, 77, 139, 0.35);
      white-space: nowrap;
    }

    .language-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 102px;
      padding: 13px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: var(--white);
      font-weight: 800;
      white-space: nowrap;
    }

    .language-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    .menu-btn {
      display: none;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 24px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .mobile-menu {
      display: none;
      background: var(--navy);
      padding: 0 24px 22px;
    }

    .mobile-menu.open {
      display: block;
    }

    .mobile-menu a {
      display: block;
      padding: 15px 0;
      border-top: 1px solid rgba(255,255,255,0.12);
      font-weight: 800;
      color: rgba(255,255,255,0.94);
    }

    .mobile-menu .mobile-buy {
      margin-top: 14px;
      padding: 14px 20px;
      text-align: center;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), #ff6b4a);
      border-top: none;
      box-shadow: 0 12px 28px rgba(240, 77, 139, 0.25);
    }

    /* SIMPLE WAITLIST HERO */

    main {
      min-height: calc(100vh - 78px);
      background:
        radial-gradient(circle at 84% 18%, rgba(255,255,255,0.13), transparent 18%),
        radial-gradient(circle at 14% 84%, rgba(201,162,74,0.13), transparent 20%),
        linear-gradient(135deg, #160f4b 0%, #221687 52%, #3320a8 100%);
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: "";
      position: absolute;
      width: 680px;
      height: 680px;
      border-radius: 50%;
      right: -260px;
      top: -180px;
      background:
        repeating-radial-gradient(
          circle,
          rgba(255,255,255,0.18) 0 1px,
          transparent 1px 9px
        );
      opacity: 0.52;
      pointer-events: none;
    }

    .waitlist-hero {
      position: relative;
      z-index: 2;
      min-height: calc(100vh - 78px);
      padding: clamp(70px, 10vw, 150px) clamp(22px, 6vw, 96px);
      display: flex;
      align-items: center;
    }

    .waitlist-content {
      width: 100%;
      max-width: 1040px;
    }

    .eyebrow {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 13px;
      font-weight: 950;
      margin-bottom: 26px;
    }

    h1 {
      color: var(--white);
      font-size: clamp(52px, 8vw, 118px);
      line-height: 0.88;
      letter-spacing: -0.075em;
      font-weight: 950;
      margin-bottom: 30px;
    }

    .hero-copy {
      color: #dbe7ff;
      font-size: clamp(20px, 2.2vw, 30px);
      line-height: 1.42;
      font-weight: 750;
      max-width: 880px;
      margin-bottom: 38px;
    }

    .highlight-date {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      border-radius: 999px;
      background: rgba(255,255,255,0.11);
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--white);
      font-size: clamp(16px, 1.5vw, 19px);
      font-weight: 900;
      box-shadow: 0 18px 42px rgba(0,0,0,0.18);
    }

    .highlight-date strong {
      color: var(--gold);
      font-weight: 950;
    }

    /* RESPONSIVE */

    @media (max-width: 1180px) {
      .nav-links {
        display: none;
      }

      .menu-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
    }

    @media (max-width: 760px) {
      .navbar {
        min-height: 74px;
        padding: 0 18px;
        gap: 14px;
      }

      .brand-logo {
        width: 42px;
        height: 42px;
      }

      .brand-name {
        font-size: 10px;
        max-width: 205px;
      }

      .buy-btn {
        display: none;
      }

      .language-btn {
        min-width: 92px;
        padding: 12px 16px;
      }

      main,
      .waitlist-hero {
        min-height: calc(100vh - 74px);
      }

      .waitlist-hero {
        padding: 64px 20px 80px;
      }

      h1 {
        font-size: clamp(48px, 15vw, 76px);
      }

      .hero-copy {
        font-size: 19px;
      }

      .highlight-date {
        align-items: flex-start;
        flex-direction: column;
        border-radius: 24px;
      }
    }

    @media (max-width: 460px) {
      .brand-name {
        font-size: 9px;
        max-width: 185px;
      }

      .language-btn {
        min-width: 86px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav class="navbar">
      <a href="en.html" class="brand">
        <img
          class="brand-logo"
          src="https://res.cloudinary.com/dh3cjks1a/image/upload/v1781047563/Logo_hppm16.webp"
          alt="Logo de International Academy of Medical Specialists"
        />
        <span class="brand-name">
          International Academy of Medical Specialists, Inc.
        </span>
      </a>

      <div class="nav-links">
        <a href="es.html">Homepage</a>
        <a href="campeche-es.html">Host City</a>
        <a href="speakers-es.html">Speakers</a>
        <a href="whatisIAMS-es.html">About IAMS</a>
      </div>


      <a class="language-btn" href="en.html">
        Español
      </a>

      <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
      <a href="en.html">Homepage</a>
      <a href="campeche-en.html">Host City</a>
      <a href="speakers-en.html">Speakers</a>
      <a href="whatisIAMS-en.html">About IAMS</a>
    </div>
  </header>

  <main>
    <section class="waitlist-hero">
      <div class="waitlist-content">
        <div class="eyebrow">Tickets Soon</div>

        <h1>The sale will open soon.</h1>

        <p class="hero-copy">
          We are preparing the registration system for the IAMS 4th World Congress 2026.
        </p>

        <div class="highlight-date">
          <span>Early Bird:</span>
          <strong>July 15 - September 15</strong>
        </div>
      </div>
    </section>
  </main>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    if (menuBtn && mobileMenu) {
      menuBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("open");
        menuBtn.textContent = mobileMenu.classList.contains("open") ? "×" : "☰";
      });
    }
  </script>
</body>
</html>
</html>
