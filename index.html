<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAMS 4th World Congress 2026</title>

  <style>
    :root {
      --navy: #191052;
      --purple: #3320a8;
      --violet: #5638f0;
      --pink: #f04d8b;
      --gold: #c9a24a;
      --white: #ffffff;
      --soft-white: #eef1ff;
      --muted: #b9c7ff;
      --light: #f7f7fb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--light);
      color: var(--white);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      color: var(--white);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .navbar {
      min-height: 78px;
      padding: 0 clamp(22px, 5vw, 80px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
    }

    .brand-name {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.25;
      color: rgba(255,255,255,0.86);
      max-width: 280px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(14px, 1.6vw, 26px);
      font-size: 14px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      white-space: nowrap;
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    .buy-btn {
      background: linear-gradient(135deg, var(--pink), #ff6b4a);
      color: white;
      padding: 13px 21px;
      border-radius: 999px;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(240, 77, 139, 0.35);
      white-space: nowrap;
    }

    .menu-btn {
      display: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 24px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .mobile-menu {
      display: none;
      background: var(--navy);
      padding: 0 24px 22px;
    }

    .mobile-menu.open {
      display: block;
    }

    .mobile-menu a {
      display: block;
      padding: 15px 0;
      border-top: 1px solid rgba(255,255,255,0.13);
      font-weight: 800;
    }

    .hero {
      min-height: calc(100vh - 78px);
      background:
        radial-gradient(circle at 82% 28%, rgba(255,255,255,0.13) 0%, rgba(255,255,255,0.06) 18%, transparent 34%),
        linear-gradient(120deg, #170f50 0%, #2417a0 48%, #5638f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(56px, 8vw, 96px) clamp(24px, 6vw, 96px);
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: min(62vw, 760px);
      height: min(62vw, 760px);
      right: -20vw;
      bottom: -28vw;
      border-radius: 50%;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.09);
      pointer-events: none;
    }

    .hero-content {
      width: 100%;
      max-width: 1180px;
      position: relative;
      z-index: 2;
    }

    .hero-kicker {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-size: clamp(12px, 1.3vw, 16px);
      font-weight: 900;
      margin-bottom: clamp(26px, 4vw, 44px);
    }

    .hero-title-main {
      font-size: clamp(76px, 13vw, 190px);
      line-height: 0.82;
      letter-spacing: -0.085em;
      font-weight: 950;
      color: var(--white);
    }

    .hero-title-sub {
      margin-top: clamp(22px, 3vw, 38px);
      font-size: clamp(34px, 5.7vw, 86px);
      line-height: 1;
      letter-spacing: 0.18em;
      font-weight: 400;
      text-transform: uppercase;
      color: rgba(255,255,255,0.86);
    }

    .hero-meta {
      margin-top: clamp(38px, 5vw, 62px);
      display: grid;
      gap: 14px;
      font-size: clamp(22px, 2.6vw, 34px);
      font-weight: 900;
      color: var(--soft-white);
    }

    .location {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }


    @media (max-width: 1120px) {
      .nav-links {
        display: none;
      }

      .menu-btn {
        display: grid;
        place-items: center;
      }
    }

    @media (max-width: 760px) {
      .navbar {
        min-height: 74px;
        padding: 0 20px;
      }

      .brand-logo {
        width: 42px;
        height: 42px;
      }

      .brand-name {
        font-size: 10px;
        max-width: 210px;
      }

      .buy-btn {
        display: none;
      }

      .hero {
        min-height: calc(100vh - 74px);
        align-items: flex-start;
        padding: 82px 28px 72px;
      }

      .hero-kicker {
        font-size: 11px;
        letter-spacing: 0.19em;
        margin-bottom: 34px;
      }

      .hero-title-main {
        font-size: clamp(68px, 21vw, 104px);
        line-height: 0.86;
        letter-spacing: -0.075em;
      }

      .hero-title-sub {
        font-size: clamp(28px, 8.5vw, 46px);
        letter-spacing: 0.13em;
        margin-top: 26px;
      }

      .hero-meta {
        margin-top: 44px;
        font-size: 23px;
      }
    }

    @media (max-width: 420px) {
      .brand-name {
        max-width: 185px;
        font-size: 9px;
      }

      .hero {
        padding: 76px 24px 64px;
      }

      .hero-title-main {
        font-size: 70px;
      }

      .hero-title-sub {
        font-size: 28px;
        letter-spacing: 0.11em;
      }

      .hero-meta {
        font-size: 21px;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav class="navbar">
      <a href="#" class="brand">
        <img
          class="brand-logo"
          src="https://res.cloudinary.com/dh3cjks1a/image/upload/v1781047563/Logo_hppm16.webp"
          alt="International Academy of Medical Specialists Logo"
        />
        <span class="brand-name">International Academy of Medical Specialists, Inc.</span>
      </a>

      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#past-events">Past Events</a>
        <a href="#faq">FAQ</a>
        <a href="#contact">Contact</a>
        <a href="#about">About IAMS</a>
        <a href="#speakers">Speakers</a>
        <a href="#campeche">Campeche City</a>
      </div>

      <a class="buy-btn" href="#tickets">Buy Tickets</a>

      <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
      <a href="#">Home</a>
      <a href="#past-events">Past Events</a>
      <a href="#faq">FAQ</a>
      <a href="#contact">Contact</a>
      <a href="#about">About IAMS</a>
      <a href="#speakers">Speakers</a>
      <a href="#campeche">Campeche City</a>
      <a href="#tickets">Buy Tickets</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-content">

        <div class="hero-title-main">IAMS 4th</div>
        <div class="hero-title-sub">World Congress</div>

        <div class="hero-meta">
          <div>October 24–25, 2026</div>
          <div>Campeche, Mexico</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    menuBtn.addEventListener("click", () => {
      mobileMenu.classList.toggle("open");
      menuBtn.textContent = mobileMenu.classList.contains("open") ? "×" : "☰";
    });
  </script>
</body>
</html>
