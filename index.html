<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAMS 4th World Congress 2026</title>

  <style>
    :root {
      --navy: #1d1458;
      --violet: #4b2ee8;
      --pink: #f04d8b;
      --gold: #c9a24a;
      --white: #ffffff;
      --light: #f7f7fb;
      --text: #111827;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--light);
      color: var(--text);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    header {
      background: var(--navy);
      color: var(--white);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar {
      min-height: 86px;
      padding: 0 5vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 900;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 26px;
      font-size: 14px;
      font-weight: 800;
    }

    .nav-links a {
      opacity: 0.92;
    }

    .nav-links a:hover {
      opacity: 1;
      color: var(--gold);
    }

    .buy-btn {
      background: linear-gradient(135deg, var(--pink), #ff6b4a);
      color: white;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(240, 77, 139, 0.35);
    }

    .menu-btn {
      display: none;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: white;
      border-radius: 999px;
      width: 46px;
      height: 46px;
      font-size: 24px;
      cursor: pointer;
    }

    .mobile-menu {
      display: none;
      padding: 0 5vw 22px;
      background: var(--navy);
    }

    .mobile-menu.open {
      display: block;
    }

    .mobile-menu a {
      display: block;
      padding: 15px 0;
      border-top: 1px solid rgba(255,255,255,0.14);
      font-weight: 800;
    }

    .hero {
      min-height: calc(100vh - 86px);
      background:
        linear-gradient(
          90deg,
          rgba(20, 15, 100, 0.98) 0%,
          rgba(36, 24, 160, 0.92) 48%,
          rgba(74, 46, 232, 0.88) 100%
        );
      color: white;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 80px 5vw;
    }

    .hero::before {
      content: "";
      position: absolute;
      left: -60px;
      bottom: -20px;
      width: 260px;
      height: 160px;
      background:
        repeating-linear-gradient(
          135deg,
          transparent 0 13px,
          rgba(255, 183, 77, 0.9) 14px 17px,
          transparent 18px 30px
        );
      opacity: 0.9;
      z-index: 1;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -95px;
      top: 80px;
      width: 455px;
      height: 455px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.16) 46%, rgba(255,255,255,0.05) 68%, rgba(255,255,255,0) 70%),
        url("https://res.cloudinary.com/dh3cjks1a/image/upload/v1781047563/Logo_hppm16.webp");
      background-size: 86%;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.92;
      filter: drop-shadow(0 30px 70px rgba(0,0,0,0.32));
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 780px;
    }

    .hero-label {
      font-size: 15px;
      font-weight: 900;
      color: #b9c7ff;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(52px, 8vw, 108px);
      line-height: 0.92;
      letter-spacing: -0.055em;
      margin-bottom: 28px;
      font-weight: 950;
    }

    .event-meta {
      display: grid;
      gap: 12px;
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 900;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 900;
    }

    .mexico {
      color: var(--white);
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.22);
      padding: 4px 13px;
      border-radius: 999px;
    }

    @media (max-width: 980px) {
      .navbar {
        min-height: 78px;
        padding: 0 28px;
        gap: 20px;
        overflow-x: auto;
      }

      .brand-logo {
        width: 50px;
        height: 50px;
      }

      .nav-links {
        display: flex;
        gap: 24px;
        font-size: 23px;
        white-space: nowrap;
      }

      .nav-links a:nth-child(n+5) {
        display: none;
      }

      .buy-btn {
        display: none;
      }

      .menu-btn {
        display: grid;
        place-items: center;
        flex: 0 0 auto;
      }

      .hero {
        min-height: calc(100vh - 78px);
        padding: 92px 40px 430px;
        align-items: flex-start;
      }

      .hero-label {
        font-size: 22px;
        line-height: 1.45;
        letter-spacing: 0.16em;
        max-width: 620px;
      }

      h1 {
        font-size: clamp(64px, 14vw, 92px);
        line-height: 0.96;
      }

      .location {
        font-size: 26px;
      }

      .hero::after {
        width: 360px;
        height: 360px;
        right: 50%;
        transform: translateX(50%);
        top: auto;
        bottom: 72px;
        background-size: 88%;
        opacity: 0.94;
      }

      .hero::before {
        width: 260px;
        height: 150px;
        left: -40px;
      }
    }

    @media (max-width: 520px) {
      .navbar {
        padding: 0 28px;
      }

      .brand span {
        font-size: 24px;
      }

      .hero {
        padding: 92px 40px 405px;
      }

      .hero-label {
        font-size: 19px;
      }

      h1 {
        font-size: 72px;
      }

      .location {
        font-size: 24px;
      }

      .hero::after {
        width: 335px;
        height: 335px;
        bottom: 70px;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav class="navbar">
      <a href="#" class="brand">
        <img
          class="brand-logo"
          src="https://res.cloudinary.com/dh3cjks1a/image/upload/v1781047563/Logo_hppm16.webp"
          alt="IAMS Logo"
        />
        <span>IAMS</span>
      </a>

      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#past-events">Past Events</a>
        <a href="#faq">FAQ</a>
        <a href="#contact">Contact</a>
        <a href="#about">About IAMS</a>
        <a href="#speakers">Speakers</a>
        <a href="#campeche">Campeche City</a>
      </div>

      <a class="buy-btn" href="#tickets">Buy Tickets</a>

      <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
      <a href="#">Home</a>
      <a href="#past-events">Past Events</a>
      <a href="#faq">FAQ</a>
      <a href="#contact">Contact</a>
      <a href="#about">About IAMS</a>
      <a href="#speakers">Speakers</a>
      <a href="#campeche">Campeche City</a>
      <a href="#tickets">Buy Tickets</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-content">
        <div class="hero-label">International Academy of Medical Specialists</div>

        <h1>IAMS 4th<br>World Congress</h1>

        <div class="event-meta">
          <div>October 24 – 25, 2026</div>
          <div class="location">📍 Campeche, <span class="mexico">Mexico</span></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    menuBtn.addEventListener("click", () => {
      mobileMenu.classList.toggle("open");
      menuBtn.textContent = mobileMenu.classList.contains("open") ? "×" : "☰";
    });
  </script>
</body>
</html>
