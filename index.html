<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAMS 4th World Congress 2026</title>

  <style>
    :root {
      --navy: #1d1458;
      --deep-navy: #17104a;
      --violet: #4b2ee8;
      --pink: #f04d8b;
      --gold: #c9a24a;
      --white: #ffffff;
      --light: #f7f7fb;
      --text: #111827;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--light);
      color: var(--text);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    header {
      background: var(--navy);
      color: var(--white);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar {
      min-height: 84px;
      padding: 0 clamp(24px, 5vw, 84px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .brand span {
      font-size: 18px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(14px, 1.6vw, 26px);
      font-size: 14px;
      font-weight: 800;
      flex-wrap: nowrap;
    }

    .nav-links a {
      opacity: 0.92;
      white-space: nowrap;
    }

    .nav-links a:hover {
      opacity: 1;
      color: var(--gold);
    }

    .buy-btn {
      background: linear-gradient(135deg, var(--pink), #ff6b4a);
      color: white;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(240, 77, 139, 0.35);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .menu-btn {
      display: none;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: white;
      border-radius: 999px;
      width: 46px;
      height: 46px;
      font-size: 24px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .mobile-menu {
      display: none;
      padding: 0 24px 22px;
      background: var(--navy);
    }

    .mobile-menu.open {
      display: block;
    }

    .mobile-menu a {
      display: block;
      padding: 15px 0;
      border-top: 1px solid rgba(255,255,255,0.14);
      font-weight: 800;
    }

    .hero {
      min-height: calc(100vh - 84px);
      background:
        linear-gradient(
          90deg,
          rgba(20, 15, 100, 0.99) 0%,
          rgba(36, 24, 160, 0.94) 50%,
          rgba(74, 46, 232, 0.90) 100%
        );
      color: white;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      padding: clamp(54px, 8vw, 92px) clamp(24px, 5vw, 84px);
    }

    .hero-inner {
      width: 100%;
      max-width: 1420px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      align-items: center;
      gap: clamp(28px, 6vw, 96px);
      position: relative;
      z-index: 2;
    }

    .hero-content {
      max-width: 780px;
    }

    .hero-label {
      font-size: clamp(13px, 1.15vw, 17px);
      font-weight: 900;
      color: #b9c7ff;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(58px, 8vw, 118px);
      line-height: 0.92;
      letter-spacing: -0.06em;
      margin-bottom: 30px;
      font-weight: 950;
    }

    .event-meta {
      display: grid;
      gap: 12px;
      font-size: clamp(22px, 2.2vw, 34px);
      font-weight: 900;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mexico {
      color: var(--white);
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.22);
      padding: 4px 13px;
      border-radius: 999px;
    }

    .hero-logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 0;
    }

    .hero-logo-circle {
      width: min(36vw, 420px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 34px 90px rgba(0,0,0,0.25);
      backdrop-filter: blur(2px);
    }

    .hero-logo-circle img {
      width: 86%;
      height: 86%;
      object-fit: contain;
      border-radius: 50%;
      opacity: 0.96;
    }

    @media (max-width: 1080px) {
      .nav-links {
        display: none;
      }

      .menu-btn {
        display: grid;
        place-items: center;
      }
    }

    @media (max-width: 760px) {
      .navbar {
        min-height: 78px;
        padding: 0 28px;
      }

      .brand-logo {
        width: 50px;
        height: 50px;
      }

      .brand span {
        font-size: 24px;
      }

      .buy-btn {
        display: none;
      }

      .hero {
        min-height: calc(100vh - 78px);
        padding: 92px 40px 66px;
        align-items: flex-start;
      }

      .hero-inner {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 54px;
      }

      .hero-label {
        font-size: 19px;
        line-height: 1.42;
        letter-spacing: 0.16em;
        max-width: 620px;
      }

      h1 {
        font-size: clamp(62px, 14vw, 86px);
        line-height: 0.96;
        margin-bottom: 28px;
      }

      .event-meta {
        font-size: 24px;
      }

      .hero-logo-wrap {
        width: 100%;
        justify-content: center;
      }

      .hero-logo-circle {
        width: min(82vw, 345px);
        background: rgba(255,255,255,0.14);
      }

      .hero-logo-circle img {
        width: 88%;
        height: 88%;
      }
    }

    @media (max-width: 420px) {
      .navbar {
        padding: 0 24px;
      }

      .brand span {
        font-size: 22px;
      }

      .hero {
        padding: 82px 32px 58px;
      }

      .hero-label {
        font-size: 16px;
      }

      h1 {
        font-size: 64px;
      }

      .event-meta {
        font-size: 22px;
      }

      .hero-logo-circle {
        width: min(82vw, 315px);
      }
    }
  </style>
</head>

<body>
  <header>
    <nav class="navbar">
      <a href="#" class="brand">
        <img
          class="brand-logo"
          src="https://res.cloudinary.com/dh3cjks1a/image/upload/v1781047563/Logo_hppm16.webp"
          alt="IAMS Logo"
        />
        <span>IAMS</span>
      </a>

      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#past-events">Past Events</a>
        <a href="#faq">FAQ</a>
        <a href="#contact">Contact</a>
        <a href="#about">About IAMS</a>
        <a href="#speakers">Speakers</a>
        <a href="#campeche">Campeche City</a>
      </div>

      <a class="buy-btn" href="#tickets">Buy Tickets</a>

      <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
      <a href="#">Home</a>
      <a href="#past-events">Past Events</a>
      <a href="#faq">FAQ</a>
      <a href="#contact">Contact</a>
      <a href="#about">About IAMS</a>
      <a href="#speakers">Speakers</a>
      <a href="#campeche">Campeche City</a>
      <a href="#tickets">Buy Tickets</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <div class="hero-content">
          <div class="hero-label">International Academy of Medical Specialists</div>

          <h1>IAMS 4th<br>World Congress</h1>

          <div class="event-meta">
            <div>October 24 – 25, 2026</div>
            <div class="location">📍 Campeche, <span class="mexico">Mexico</span></div>
          </div>
        </div>

        <div class="hero-logo-wrap">
          <div class="hero-logo-circle">
            <img
              src="https://res.cloudinary.com/dh3cjks1a/image/upload/v1781047563/Logo_hppm16.webp"
              alt="International Academy of Medical Specialists Logo"
            />
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    menuBtn.addEventListener("click", () => {
      mobileMenu.classList.toggle("open");
      menuBtn.textContent = mobileMenu.classList.contains("open") ? "×" : "☰";
    });
  </script>
</body>
</html>
